      year: Aug 2023 - Dec 2023
      description: 
        - title: Large Language Models (LLMs) for Code Understanding & Synthesis
          contents:
            - Utilized state of the art LLMs such as Code Llama to analyze and detect code vulnerabilities.  	   
            - Explore prompt engineering frameworks such as the Graph of Thoughts to solve elaborate problems in a cyber security context.
            - Utilized LangChain to automate the analysis process of code vulnerabilities and implement various prompt engineering techniques such as a chain of thoughts.
